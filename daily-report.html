<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>苏曼夏令营 · 每日工作反馈</title>
<style>
  :root {
    --ink: #1f2a24;
    --paper: #faf8f4;
    --line: #ddd6c8;
    --accent: #7030a0;
    --accent-soft: #f1e6f7;
    --warn: #b5481f;
    --warn-soft: #fbe9e1;
    --muted: #756f62;
    --radius: 10px;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #faf8f4;
    width: 100%;
  }

  * { box-sizing: border-box; }

  .app {
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 40px;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
  }

  .topbar {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .topbar .brand {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .topbar h1 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .screen { display: none; padding: 18px 20px 0; }
  .screen.active { display: block; }

  @media (max-width: 380px) {
    .topbar { padding: 18px 14px 14px; }
    .screen { padding: 14px 14px 0; }
    .card { padding: 14px; }
  }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
  }

  .card h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin: 0 0 14px;
    font-weight: 700;
  }

  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  select, input[type=number], textarea, input[type=text] {
    width: 100%;
    padding: 11px 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 16px;
    color: var(--ink);
    font-family: inherit;
  }

  select:focus, input:focus, textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  textarea { resize: vertical; min-height: 70px; }

  .hint { font-size: 12px; color: var(--muted); margin-top: 5px; }

  .meal-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-items: end;
  }

  .meal-block {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
  }

  .meal-block:last-child { margin-bottom: 0; }

  .meal-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .meal-count-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .meal-count-row .field { flex: 1; margin-bottom: 0; }

  .meal-expected-badge {
    flex-shrink: 0;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 8px;
    padding: 9px 14px;
    text-align: center;
    line-height: 1.1;
  }

  .meal-expected-badge .num {
    font-size: 20px;
    font-weight: 800;
    display: block;
  }

  .meal-expected-badge .lbl {
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
  }

  .meal-diff {
    font-size: 12px;
    margin-top: 8px;
    font-weight: 600;
  }
  .meal-diff.ok { color: var(--accent); }
  .meal-diff.short { color: var(--warn); }
  .meal-diff.over { color: var(--warn); }

  .meal-overnote {
    margin-top: 10px;
    display: none;
  }
  .meal-overnote.show { display: block; }

  .seg {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .seg button {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: #fff;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .seg button + button { border-left: 1px solid var(--line); }
  .seg button.on.yes { background: var(--accent-soft); color: var(--accent); }
  .seg button.on.no { background: var(--warn-soft); color: var(--warn); }

  .conditional {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
    display: none;
  }
  .conditional.show { display: block; }

  .encourage-note {
    margin: 18px 20px 0;
    padding: 12px 14px;
    background: var(--accent-soft);
    border: 1px dashed var(--accent);
    border-radius: 10px;
    font-size: 13px;
    color: var(--accent);
    line-height: 1.6;
    text-align: center;
  }

  .submit-bar {
    padding: 14px 20px 0;
  }

  .btn-submit {
    width: 100%;
    padding: 15px 0;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-submit:active { opacity: 0.85; }
  .btn-submit:disabled { background: #b9c4bd; cursor: not-allowed; }

  .status-msg {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 18px;
  }
  .status-msg.success { color: var(--accent); font-weight: 600; }
  .status-msg.error { color: var(--warn); font-weight: 600; }

  .success-screen {
    text-align: center;
    padding: 60px 20px;
  }
  .success-screen .check {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 28px;
  }
  .success-screen h2 { font-size: 18px; margin: 0 0 6px; }
  .success-screen p { font-size: 14px; color: var(--muted); margin: 0 0 24px; }
  .btn-secondary {
    padding: 11px 22px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
  }

  .loading-screen {
    text-align: center;
    padding: 90px 24px;
    color: var(--muted);
    font-size: 14px;
  }
  .loading-screen .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--accent-soft);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen .retry-btn {
    margin-top: 16px;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: #fff;
    color: var(--accent);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    display: none;
  }
  .loading-screen.error .retry-btn { display: inline-block; }
  .loading-screen.error .spinner { display: none; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">Suman Group · 2026 Summer Camp</div>
    <h1>每日工作反馈</h1>
  </div>

  <!-- ============ LOADING SCREEN ============ -->
  <div class="screen active" id="screenLoading">
    <div class="loading-screen" id="loadingBox">
      <div class="spinner"></div>
      <div id="loadingText">正在加载团组信息...</div>
      <button class="retry-btn" id="retryLoadBtn">重新加载</button>
    </div>
  </div>

  <!-- ============ FORM SCREEN ============ -->
  <div class="screen" id="screenForm">

    <div class="card">
      <h2>基础信息</h2>
      <div class="field">
        <label>团组 Group</label>
        <select id="groupSelect"></select>
      </div>
      <div class="field">
        <label>填报人</label>
        <select id="nameSelect"></select>
      </div>
      <div class="field">
        <label>日期</label>
        <input type="text" id="dateInput" readonly />
      </div>
    </div>

    <div class="card">
      <h2>用餐人数反馈</h2>
      <div id="mealBlocks"></div>
    </div>

    <div class="card">
      <h2>当日完成情况</h2>
      <div class="field">
        <label>点名 / 人数清点是否每次完成？</label>
        <div class="seg" data-key="rollcall">
          <button data-val="yes">是</button>
          <button data-val="no">否</button>
        </div>
        <div class="conditional" data-cond="rollcall">
          <textarea id="rollcallNote" placeholder="简述尚未完成原因..."></textarea>
        </div>
      </div>
      <div class="field">
        <label>今日行程是否按计划完成？</label>
        <div class="seg" data-key="itinerary">
          <button data-val="yes">是</button>
          <button data-val="no">否</button>
        </div>
        <div class="conditional" data-cond="itinerary">
          <textarea id="itineraryNote" placeholder="简述未完成原因..."></textarea>
        </div>
      </div>
      <div class="field">
        <label>行程结束后将学生送回酒店，与酒店值班人员交接是否正常？</label>
        <div class="seg" data-key="hotel">
          <button data-val="yes">是</button>
          <button data-val="no">否</button>
        </div>
        <div class="conditional" data-cond="hotel">
          <textarea id="hotelNote" placeholder="简述未完成原因..."></textarea>
        </div>
      </div>
      <div class="field">
        <label>明日行程是否已通知？</label>
        <div class="seg" data-key="notified">
          <button data-val="yes">是</button>
          <button data-val="no">否</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>异常情况</h2>
      <div class="field">
        <label>今天是否发生需要记录的异常情况？</label>
        <div class="seg" data-key="incident">
          <button data-val="yes">是</button>
          <button data-val="no">否</button>
        </div>
      </div>
      <div class="conditional" data-cond="incident">
        <div class="field">
          <label>异常类型</label>
          <select id="incidentType">
            <option value="">请选择...</option>
            <option value="学生身体不适/受伤">学生身体不适 / 受伤</option>
            <option value="学生走失">学生走失</option>
            <option value="学生迟到">学生迟到</option>
            <option value="物品遗失">物品遗失</option>
            <option value="餐食不足">餐食不足</option>
            <option value="天气调整">天气调整</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="field">
          <label>简要说明</label>
          <textarea id="incidentNote" placeholder="涉及学生、处理过程..."></textarea>
        </div>
        <div class="field">
          <label>是否已上报领队老师 / 苏曼工作人员？</label>
          <div class="seg" data-key="reported">
            <button data-val="yes">是</button>
            <button data-val="no">否</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>今日总结</h2>
      <div class="field">
        <textarea id="summaryNote" placeholder="例如：行程顺利，无异常 / 简述今日情况..."></textarea>
      </div>
    </div>

    <div class="encourage-note">🌙 今天也辛苦啦，孩子们能平安玩到现在，多亏了你！填完这条就可以歇歇啦～</div>

    <div class="submit-bar">
      <button class="btn-submit" id="submitBtn">提交今日日志</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

  <!-- ============ SUCCESS SCREEN ============ -->
  <div class="screen" id="screenSuccess">
    <div class="success-screen">
      <div class="check">✓</div>
      <h2>提交成功啦！</h2>
      <p>辛苦一整天的你，值得被表扬 🌟<br>快去休息吧，明天又是元气满满的一天！</p>
      <button class="btn-secondary" id="backToFormBtn">填写新的一条</button>
    </div>
  </div>




<script>
(function(){

  // ===================== CONFIG =====================
  // Paste your deployed Google Apps Script Web App URL here (see deployment steps).
  var SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzEn142tN_nv3ETlRUe0xQjYLCG9MZFaT9HOHcyKKkt4QiN25c98QCuvjxiAPCeTBnIDA/exec";

  // GROUPS and MEALS are no longer hard-coded here. They are fetched
  // live from the "团组配置" and "用餐地点配置" tabs in Google Sheets
  // each time the form loads (see loadConfig() below). To add/remove
  // a counselor, a whole group, or a restaurant, edit those Sheet tabs
  // directly - no code changes or redeployment needed.
  var GROUPS = [];
  var MEALS = [
    { key: 'lunch', label: '午餐', locations: [] },
    { key: 'dinner', label: '晚餐', locations: [] }
  ];

  // ===================== STATE =====================
  var segState = {};

  function todayStr(){
    var d = new Date();
    var y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return y + "-" + m + "-" + day;
  }

  // ===================== SCREENS =====================
  var screenLoading = document.getElementById('screenLoading');
  var screenForm = document.getElementById('screenForm');
  var screenSuccess = document.getElementById('screenSuccess');

  function showScreen(name){
    [screenLoading, screenForm, screenSuccess].forEach(function(s){ s.classList.remove('active'); });
    if(name === 'loading'){ screenLoading.classList.add('active'); }
    if(name === 'form'){ screenForm.classList.add('active'); }
    if(name === 'success'){ screenSuccess.classList.add('active'); }
  }

  document.getElementById('backToFormBtn').addEventListener('click', function(){
    resetForm();
    showScreen('form');
  });

  // ===================== POPULATE GROUP / NAME =====================
  var groupSelect = document.getElementById('groupSelect');
  var nameSelect = document.getElementById('nameSelect');
  var dateInput = document.getElementById('dateInput');

  function populateGroups(){
    groupSelect.innerHTML = '';
    GROUPS.forEach(function(g){
      var opt = document.createElement('option');
      opt.value = g.id;
      opt.textContent = g.label;
      groupSelect.appendChild(opt);
    });
  }

  function populateNames(){
    var g = GROUPS.find(function(x){ return x.id === groupSelect.value; });
    nameSelect.innerHTML = '';
    if(!g) return;
    g.staff.forEach(function(n){
      var opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      nameSelect.appendChild(opt);
    });
  }
  groupSelect.addEventListener('change', function(){
    populateNames();
    renderMeals();
  });

  function initFormUI(){
    populateGroups();
    populateNames();
    dateInput.value = todayStr();
    renderMeals();
  }

  // ===================== MEAL BLOCKS =====================
  var mealBlocksEl = document.getElementById('mealBlocks');

  function renderMeals(){
    var g = GROUPS.find(function(x){ return x.id === groupSelect.value; });
    var expected = g ? g.expected : 0;
    mealBlocksEl.innerHTML = '';
    MEALS.forEach(function(m){
      var div = document.createElement('div');
      div.className = 'meal-block';
      var locOptions = '<option value="">请选择用餐地点...</option>' +
        m.locations.map(function(loc){
          return '<option value="' + loc.replace(/"/g,'&quot;') + '">' + loc + '</option>';
        }).join('');
      div.innerHTML =
        '<div class="meal-name">' + m.label + '</div>' +
        '<div class="field" style="margin-bottom:10px;">' +
        '<label style="font-size:13px;">用餐地点</label>' +
        '<select id="loc_' + m.key + '">' + locOptions + '</select>' +
        '</div>' +
        '<div class="meal-count-row">' +
        '<div class="field">' +
        '<label style="font-size:13px;">实际用餐人数（不含辅导员）</label>' +
        '<input type="number" inputmode="numeric" min="0" id="meal_' + m.key + '" placeholder="输入实际用餐人数" />' +
        '</div>' +
        '<div class="meal-expected-badge"><span class="num">' + expected + '</span><span class="lbl">应到人数</span></div>' +
        '</div>' +
        '<div class="meal-diff" id="diff_' + m.key + '"></div>' +
        '<div class="field meal-overnote" id="overwrap_' + m.key + '">' +
        '<label style="font-size:13px;">实际用餐人数超过应到人数，请说明原因</label>' +
        '<textarea id="overnote_' + m.key + '" placeholder="例如：临时加了随团老师 / 借餐位给其他团组..."></textarea>' +
        '</div>';
      mealBlocksEl.appendChild(div);
    });

    MEALS.forEach(function(m){
      var input = document.getElementById('meal_' + m.key);
      input.addEventListener('input', function(){
        var diffEl = document.getElementById('diff_' + m.key);
        var overWrap = document.getElementById('overwrap_' + m.key);
        var val = parseInt(input.value, 10);
        if(isNaN(val)){
          diffEl.textContent = '';
          overWrap.classList.remove('show');
          return;
        }
        var diff = expected - val;
        if(diff === 0){
          diffEl.textContent = '✓ 人数齐';
          diffEl.className = 'meal-diff ok';
          overWrap.classList.remove('show');
        } else if(diff > 0){
          diffEl.textContent = '缺 ' + diff + ' 人';
          diffEl.className = 'meal-diff short';
          overWrap.classList.remove('show');
        } else {
          diffEl.textContent = '超出应到人数 ' + (-diff) + ' 人，请说明原因';
          diffEl.className = 'meal-diff over';
          overWrap.classList.add('show');
        }
      });
    });
  }


  // ===================== SEGMENTED YES/NO =====================
  document.querySelectorAll('.seg').forEach(function(seg){
    var key = seg.getAttribute('data-key');
    segState[key] = null;
    seg.querySelectorAll('button').forEach(function(btn){
      btn.addEventListener('click', function(){
        seg.querySelectorAll('button').forEach(function(b){ b.classList.remove('on','yes','no'); });
        var val = btn.getAttribute('data-val');
        btn.classList.add('on', val);
        segState[key] = val;
        updateConditionals();
      });
    });
  });

  function updateConditionals(){
    var noTriggerKeys = ['rollcall', 'itinerary', 'hotel'];
    var noteFieldMap = {
      rollcall: 'rollcallNote',
      itinerary: 'itineraryNote',
      hotel: 'hotelNote'
    };
    document.querySelectorAll('.conditional').forEach(function(c){
      var key = c.getAttribute('data-cond');
      var shouldShow = false;
      if(noTriggerKeys.indexOf(key) !== -1){
        shouldShow = segState[key] === 'no';
      } else if(key === 'incident'){
        shouldShow = segState[key] === 'yes';
      }
      if(shouldShow){
        c.classList.add('show');
      } else {
        c.classList.remove('show');
        if(noteFieldMap[key]){
          document.getElementById(noteFieldMap[key]).value = '';
        } else if(key === 'incident'){
          document.getElementById('incidentType').value = '';
          document.getElementById('incidentNote').value = '';
          segState.reported = null;
          var repSeg = document.querySelector('.seg[data-key="reported"]');
          if(repSeg) repSeg.querySelectorAll('button').forEach(function(b){ b.classList.remove('on','yes','no'); });
        }
      }
    });
  }

  // ===================== SUBMIT =====================
  var submitBtn = document.getElementById('submitBtn');
  var statusMsg = document.getElementById('statusMsg');

  submitBtn.addEventListener('click', async function(){
    var g = GROUPS.find(function(x){ return x.id === groupSelect.value; });
    if(!g){ showStatus('请选择团组', true); return; }
    if(!nameSelect.value){ showStatus('请选择填报人', true); return; }
    if(!segState.rollcall || !segState.itinerary || !segState.hotel || !segState.notified || !segState.incident){
      showStatus('请完成所有是/否选项', true); return;
    }

    var meals = {};
    var hasShort = false;
    var hasOver = false;
    var locations = {};
    var overNotes = {};
    for(var i=0;i<MEALS.length;i++){
      var m = MEALS[i];
      var loc = document.getElementById('loc_' + m.key).value;
      if(!loc){ showStatus('请选择' + m.label + '用餐地点', true); return; }
      var v = document.getElementById('meal_' + m.key).value;
      if(v === ''){ showStatus('请填写' + m.label + '实际用餐人数', true); return; }
      meals[m.key] = parseInt(v,10);
      locations[m.key] = loc;
      if(meals[m.key] < g.expected) hasShort = true;
      if(meals[m.key] > g.expected){
        hasOver = true;
        var overNote = document.getElementById('overnote_' + m.key).value.trim();
        if(!overNote){ showStatus('请说明' + m.label + '人数超出原因', true); return; }
        overNotes[m.key] = overNote;
      } else {
        overNotes[m.key] = '';
      }
    }

    if(segState.rollcall === 'no'){
      var rollcallNote = document.getElementById('rollcallNote').value.trim();
      if(!rollcallNote){ showStatus('请简述点名 / 人数清点尚未完成原因', true); return; }
    }

    if(segState.hotel === 'no'){
      var hotelNote = document.getElementById('hotelNote').value.trim();
      if(!hotelNote){ showStatus('请简述酒店交接异常原因', true); return; }
    }

    if(segState.incident === 'yes'){
      var itype = document.getElementById('incidentType').value;
      var inote = document.getElementById('incidentNote').value.trim();
      if(!itype){ showStatus('请选择异常类型', true); return; }
      if(!inote){ showStatus('请简要说明异常情况', true); return; }
      if(!segState.reported){ showStatus('请确认是否已上报', true); return; }
    }

    var summary = document.getElementById('summaryNote').value.trim();
    if(!summary){ showStatus('请填写今日总结', true); return; }

    var record = {
      group: g.id,
      groupLabel: g.label,
      expected: g.expected,
      reporter: nameSelect.value,
      date: dateInput.value,
      lunch: meals.lunch,
      lunchLocation: locations.lunch,
      lunchOverNote: overNotes.lunch,
      dinner: meals.dinner,
      dinnerLocation: locations.dinner,
      dinnerOverNote: overNotes.dinner,
      hasShort: hasShort ? '是' : '否',
      hasOver: hasOver ? '是' : '否',
      rollcall: segState.rollcall === 'yes' ? '是' : '否',
      rollcallNote: segState.rollcall === 'no' ? document.getElementById('rollcallNote').value.trim() : '',
      itinerary: segState.itinerary === 'yes' ? '是' : '否',
      itineraryNote: segState.itinerary === 'no' ? document.getElementById('itineraryNote').value.trim() : '',
      hotel: segState.hotel === 'yes' ? '是' : '否',
      hotelNote: segState.hotel === 'no' ? document.getElementById('hotelNote').value.trim() : '',
      notified: segState.notified === 'yes' ? '是' : '否',
      incident: segState.incident === 'yes' ? '是' : '否',
      incidentType: segState.incident === 'yes' ? document.getElementById('incidentType').value : '',
      incidentNote: segState.incident === 'yes' ? document.getElementById('incidentNote').value.trim() : '',
      reported: segState.incident === 'yes' ? (segState.reported === 'yes' ? '是' : '否') : '',
      summary: summary,
      submittedAt: new Date().toISOString()
    };

    if(!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.indexOf('PASTE_YOUR') === 0){
      showStatus('尚未配置 Google Sheets 提交地址，请联系管理员', true);
      return;
    }

    submitBtn.disabled = true;
    showStatus('正在提交...', false);

    try {
      var res = await fetch(SHEET_WEBAPP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(record)
      });

      var data = null;
      try { data = await res.json(); } catch(e){ data = null; }

      if(res.ok && data && data.result === 'success'){
        showStatus('提交成功', false, true);
        submitBtn.disabled = false;
        setTimeout(function(){
          resetForm();
          showScreen('success');
        }, 300);
      } else {
        showStatus('提交失败，请重试（数据已保留）', true);
        submitBtn.disabled = false;
      }
    } catch(err){
      console.error(err);
      showStatus('提交失败，请检查网络后重试（数据已保留）', true);
      submitBtn.disabled = false;
    }
  });

  function showStatus(text, isError, isSuccess){
    statusMsg.textContent = text;
    statusMsg.className = 'status-msg' + (isError ? ' error' : (isSuccess ? ' success' : ''));
  }

  function resetForm(){
    groupSelect.selectedIndex = 0;
    populateNames();
    renderMeals();
    dateInput.value = todayStr();
    segState = {};
    document.querySelectorAll('.seg button').forEach(function(b){ b.classList.remove('on','yes','no'); });
    document.querySelectorAll('.seg').forEach(function(seg){ segState[seg.getAttribute('data-key')] = null; });
    document.querySelectorAll('.conditional').forEach(function(c){ c.classList.remove('show'); });
    document.getElementById('rollcallNote').value = '';
    document.getElementById('itineraryNote').value = '';
    document.getElementById('hotelNote').value = '';
    document.getElementById('incidentType').value = '';
    document.getElementById('incidentNote').value = '';
    document.getElementById('summaryNote').value = '';
    statusMsg.textContent = '';
  }

  // ===================== LOAD CONFIG FROM GOOGLE SHEETS =====================
  // Fetches the current 团组配置 (groups/counselors) and 用餐地点配置
  // (meal locations) directly from the Google Sheet each time the
  // form is opened, so edits made in Sheets show up immediately
  // without needing to touch this file or redeploy anything.

  var loadingBox = document.getElementById('loadingBox');
  var loadingText = document.getElementById('loadingText');
  var retryLoadBtn = document.getElementById('retryLoadBtn');

  async function loadConfig(){
    loadingBox.classList.remove('error');
    loadingText.textContent = '正在加载团组信息...';

    if(!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.indexOf('PASTE_YOUR') === 0){
      loadingText.textContent = '尚未配置 Google Sheets 地址，请联系管理员';
      loadingBox.classList.add('error');
      return;
    }

    try {
      var res = await fetch(SHEET_WEBAPP_URL + '?action=config');
      var data = await res.json();

      if(!res.ok || !data || data.result !== 'success'){
        throw new Error((data && data.message) || '加载失败');
      }

      GROUPS = Array.isArray(data.groups) ? data.groups : [];
      MEALS[0].locations = (data.meals && Array.isArray(data.meals.lunch)) ? data.meals.lunch : [];
      MEALS[1].locations = (data.meals && Array.isArray(data.meals.dinner)) ? data.meals.dinner : [];

      if(GROUPS.length === 0){
        loadingText.textContent = '团组配置为空，请检查 Google Sheet';
        loadingBox.classList.add('error');
        return;
      }

      initFormUI();
      showScreen('form');

    } catch(err){
      console.error(err);
      loadingText.textContent = '加载团组信息失败，请检查网络后重试';
      loadingBox.classList.add('error');
    }
  }

  retryLoadBtn.addEventListener('click', function(){
    loadConfig();
  });

  loadConfig();

})();
</script>
</body>
</html>
